services:
  # ──────────────────────────────────────────────────────
  # Backend Service — Spring Boot REST API (Java runtime)
  # ──────────────────────────────────────────────────────
  - type: web
    name: quiz-generator-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    region: oregon
    plan: free
    healthCheckPath: /api/actuator/health
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: quiz-generator-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: quiz-generator-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: quiz-generator-db
          property: database
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: quiz-generator-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: quiz-generator-db
          property: password
      - key: SPRING_DATASOURCE_DRIVER
        value: org.postgresql.Driver
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: "10000"
      - key: ALLOWED_ORIGINS
        value: https://quiz-generator-frontend.onrender.com
      - key: H2_CONSOLE_ENABLED
        value: "false"

  # ──────────────────────────────────────────────────────
  # Frontend Service — React / Vite (static runtime)
  # ──────────────────────────────────────────────────────
  - type: web
    name: quiz-generator-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://quiz-generator-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # ──────────────────────────────────────────────────────
  # PostgreSQL — Managed by Render
  # ──────────────────────────────────────────────────────
  - name: quiz-generator-db
    databaseName: quizgen
    user: quizgen_user
    plan: free
    region: oregon
