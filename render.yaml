services:
  # ─────────────────────────────────────────────
  # Backend Service — Spring Boot REST API
  # ─────────────────────────────────────────────
  - type: web
    name: quiz-generator-backend
    env: java
    region: oregon
    plan: free

    buildCommand: cd backend && mvn clean package -DskipTests
    startCommand: cd backend && java -jar target/quiz-generator-api-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/actuator/health

    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: quiz-generator-db
          property: connectionString

      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: quiz-generator-db
          property: user

      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: quiz-generator-db
          property: password

      - key: SPRING_DATASOURCE_DRIVER
        value: org.postgresql.Driver

      - key: JWT_SECRET
        generateValue: true

      - key: GEMINI_API_KEY
        sync: false

      - key: PORT
        value: "10000"

      - key: ALLOWED_ORIGINS
        value: https://quiz-generator-frontend.onrender.com

  # ─────────────────────────────────────────────
  # Frontend Service — React + Vite
  # ─────────────────────────────────────────────
  - type: web
    name: quiz-generator-frontend
    runtime: static
    plan: free

    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: dist

    envVars:
      - key: VITE_API_BASE_URL
        value: https://quiz-generator-backend.onrender.com/api

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: quiz-generator-db
    databaseName: quizgen
    user: quizgen_user
    plan: free
    region: oregon