services:
  # Backend Service - Spring Boot API
- type: static
  name: quiz-generator-frontend
    env: java
    buildCommand: cd backend && mvn clean package -DskipTests
    startCommand: cd backend && java -jar target/*.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: quiz-generator-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: quiz-generator-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: quiz-generator-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
    plan: free

  # Frontend Service - React/Vite
- type: static
  name: quiz-generator-frontend
  buildCommand: cd frontend && npm install && npm run build
  staticPublishPath: frontend/dist

  envVars:
    - key: VITE_API_BASE_URL
      value: https://quiz-generator-backend.onrender.com/api

  plan: free

databases:
  # PostgreSQL Database
  - name: quiz-generator-db
    databaseName: quizgen
    user: quizgen_user
    plan: free
