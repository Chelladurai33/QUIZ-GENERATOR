# ─────────────────────────────────────────────────────────────────────────────
# Server Configuration
# Render assigns PORT dynamically; fallback to 8080 for local dev
# ─────────────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─────────────────────────────────────────────────────────────────────────────
# Database Configuration
# Local: H2 in-memory | Production: PostgreSQL via SPRING_DATASOURCE_URL env var
# ─────────────────────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:quizdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# H2 Console — local development only; not reachable in production (PostgreSQL)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# ─────────────────────────────────────────────────────────────────────────────
# JPA / Hibernate — auto-detects dialect (H2 locally, PostgreSQL on Render)
# ─────────────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Do NOT hardcode spring.jpa.database-platform; Hibernate auto-selects it.

# ─────────────────────────────────────────────────────────────────────────────
# Multipart File Upload Limits
# ─────────────────────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ─────────────────────────────────────────────────────────────────────────────
# JWT (JSON Web Token)
# ─────────────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:quiz-generator-secret-key-change-in-production}
jwt.expiration=86400000

# ─────────────────────────────────────────────────────────────────────────────
# AI Configuration (Gemini API)
# ─────────────────────────────────────────────────────────────────────────────
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# ─────────────────────────────────────────────────────────────────────────────
# CORS — Allowed origins read from env var (set in render.yaml)
# ─────────────────────────────────────────────────────────────────────────────
allowed.origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000}

# ─────────────────────────────────────────────────────────────────────────────
# Spring Actuator — health endpoint for Render health checks
# ─────────────────────────────────────────────────────────────────────────────
management.endpoints.web.base-path=/api/actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
