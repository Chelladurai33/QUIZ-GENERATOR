# Server Configuration
server.port=${PORT:8080}

# Database Configuration
# For local development, use H2 database
# For production, set SPRING_DATASOURCE_URL environment variable
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:quizdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# H2 Console (for local development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# PostgreSQL Dialect (only used when PostgreSQL URL is provided)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Multipart File Upload Properties
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# JWT (JSON Web Token) parameters
jwt.secret=${JWT_SECRET:quiz-generator-secret-key-change-in-production}
jwt.expiration=86400000

# AI Configuration (Gemini API)
# Get a free key from Google AI Studio: https://aistudio.google.com/
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
