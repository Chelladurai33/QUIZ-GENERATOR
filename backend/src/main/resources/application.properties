# Server Configuration
server.port=8080

# Database Configuration (Embedded H2 for local development)
spring.datasource.url=jdbc:h2:file:./data/quizgen;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


# JPA / Hibernate Configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Uncomment the following block to use MySQL instead of embedded H2
# spring.datasource.url=jdbc:mysql://localhost:3306/quizgen_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Multipart File Upload Properties
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# JWT (JSON Web Token) parameters
# Custom 256-bit Hex Key for signing JWT
jwt.secret=9a4f2c8d3e7b1a6c5d8e7b9a0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d
jwt.expiration=86400000

# AI Configuration (Gemini API)
# Get a free key from Google AI Studio: https://aistudio.google.com/
gemini.api.key=YOUR_GEMINI_API_KEY_HERE
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
