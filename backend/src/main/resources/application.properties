# ─────────────────────────────────────────────────────────────────────────────
# Server Configuration
# ─────────────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─────────────────────────────────────────────────────────────────────────────
# Database Configuration
# Local: H2 in-memory | Production: PostgreSQL (via SPRING_DATASOURCE_URL env)
# ─────────────────────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:quizdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# H2 Console (local development only — disabled in production via missing H2 driver)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─────────────────────────────────────────────────────────────────────────────
# JPA / Hibernate Configuration
# Let Hibernate auto-detect dialect (supports both H2 and PostgreSQL)
# ─────────────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Do NOT set spring.jpa.database-platform here — Hibernate auto-detects correctly
# for both H2 (local) and PostgreSQL (Render production).

# ─────────────────────────────────────────────────────────────────────────────
# Multipart File Upload Limits
# ─────────────────────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ─────────────────────────────────────────────────────────────────────────────
# JWT (JSON Web Token)
# ─────────────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:quiz-generator-secret-key-change-in-production}
jwt.expiration=86400000

# ─────────────────────────────────────────────────────────────────────────────
# AI Configuration (Gemini API)
# ─────────────────────────────────────────────────────────────────────────────
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
